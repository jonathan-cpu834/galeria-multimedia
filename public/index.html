<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Multimedia CRUD</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">

<div class="max-w-xl mx-auto bg-white p-6 rounded-lg shadow mb-8">

    <h1 class="text-3xl font-bold mb-4">
        Galería Multimedia CRUD
    </h1>

    <form
        action="/api/multimedia"
        method="POST"
        enctype="multipart/form-data"
        class="space-y-4"
    >

        <div>
            <label class="block font-semibold">Título</label>
            <input
                type="text"
                name="titulo"
                required
                class="w-full border p-2 rounded"
            >
        </div>

        <div>
            <label class="block font-semibold">Descripción</label>
            <textarea
                name="descripcion"
                class="w-full border p-2 rounded"
            ></textarea>
        </div>

        <div>
            <label class="block font-semibold">Imagen</label>
            <input
                type="file"
                name="imagen"
                accept="image/*"
                required
            >
        </div>

        <div>
            <label class="block font-semibold">Audio</label>
            <input
                type="file"
                name="audio"
                accept="audio/*"
                required
            >
        </div>

        <button
            type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded"
        >
            Guardar
        </button>

    </form>

</div>

<div class="max-w-7xl mx-auto">

    <h2 class="text-3xl font-bold mb-6">
        CRUD ACTIVO
    </h2>

    <div
        id="galeria"
        class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
    ></div>

</div>

<script>

async function cargarGaleria() {

    try {

        const respuesta =
            await fetch("/api/multimedia");

        const datos =
            await respuesta.json();

        const galeria =
            document.getElementById("galeria");

        galeria.innerHTML = "";

        datos.reverse().forEach(item => {

            galeria.innerHTML += `
            <div class="bg-white p-4 rounded-lg shadow">

                <img
                    src="${item.imagenUrl}"
                    class="w-full h-64 object-cover rounded"
                >

                <h3 class="text-xl font-bold mt-3">
                    ${item.titulo}
                </h3>

                <p class="text-gray-600 mb-3">
                    ${item.descripcion || ""}
                </p>

                <audio controls class="w-full mb-4">
                    <source src="${item.audioUrl}">
                </audio>

                <div class="flex gap-2">

                    <button
                        onclick="editar('${item._id}')"
                        class="bg-yellow-500 text-white px-3 py-2 rounded"
                    >
                        Editar
                    </button>

                    <button
                        onclick="eliminarRegistro('${item._id}')"
                        class="bg-red-600 text-white px-3 py-2 rounded"
                    >
                        Eliminar
                    </button>

                </div>

            </div>
            `;
        });

    } catch(error) {

        console.error(error);

    }
}

async function editar(id) {

    const titulo =
        prompt("Nuevo título:");

    if(!titulo) return;

    const descripcion =
        prompt("Nueva descripción:");

    try {

        await fetch(`/api/multimedia/${id}`, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                titulo,
                descripcion
            })

        });

        cargarGaleria();

    } catch(error) {

        console.error(error);

    }
}

async function eliminarRegistro(id) {

    const confirmar =
        confirm("¿Eliminar elemento?");

    if(!confirmar) return;

    try {

        await fetch(`/api/multimedia/${id}`, {
            method: "DELETE"
        });

        cargarGaleria();

    } catch(error) {

        console.error(error);

    }
}

cargarGaleria();

</script>

</body>
</html>
